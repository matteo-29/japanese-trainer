<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日本語 Trainer</title>
    
    <!-- WICHTIG FÜR PWA -->
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root {
            /* Hier ändern wir die Hauptfarbe wieder auf Ihr Blau */
            --primary-color: #2196F3;
            --secondary-color: #4CAF50;
            --bg-color: #f4f4f9;
            --text-color: #333;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: var(--bg-color); color: var(--text-color); padding-bottom: 20px; }
        header { background: var(--primary-color); color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .card { background: white; padding: 20px; margin: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-primary, .btn-secondary, .btn-install { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-install { background: #ff9800; color: white; margin-top: 20px; display: none; } /* Standardmäßig versteckt */
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        
        #furigana { font-size: 14px; color: #666; text-align: center; min-height: 20px; margin-bottom: 5px; }
        #kanji { font-size: 48px; text-align: center; margin-bottom: 20px; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; margin: 20% auto; padding: 20px; width: 85%; border-radius: 10px; text-align: center; }
        
        /* Spinner */
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <button id="btnBackToMenu" style="display: none; background: none; border: none; color: white; font-size: 20px; cursor: pointer; position: absolute; left: 15px; top: 15px; padding: 0;">⬅️</button>
    日本語 Trainer
</header>

<!-- ANSICHT 0: HAUPTMENÜ -->
<div id="viewMenu" style="padding: 20px; text-align: center;">
    <h2 style="margin-bottom: 30px;">Hauptmenü</h2>
    <button id="btnStartLernen" class="btn-primary" style="padding: 20px; font-size: 18px;">▶️ Start</button>
    <button id="btnLernfortschritt" class="btn-secondary" style="padding: 20px; font-size: 18px;">📊 Lernfortschritt</button>
    <button id="btnWorterverzeichnis" class="btn-secondary" style="padding: 20px; font-size: 18px;">📖 Wörterverzeichnis</button>
    
    <!-- INSTALLATIONS BUTTON -->
    <button id="btnInstall" class="btn-install">📱 App auf Homescreen installieren</button>
</div>

<!-- Restliche HTML Struktur bleibt gleich (viewLernen, viewFortschritt, viewVerzeichnis, Modals...) -->

<script src="app.js"></script>
</body>
</html>
